name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Clients
        run: |
          cd apps/master-data-svc && npx prisma generate && cd ../..
          cd apps/yarn-fabric-svc && npx prisma generate && cd ../..
          cd apps/audit-svc && npx prisma generate && cd ../..

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Run Turbo Lint
        run: npx turbo run lint
        continue-on-error: true

      - name: Run Turbo Build
        run: npx turbo run build
        env:
          # Stub DATABASE_URL so Prisma client doesn't fail at build time
          DATABASE_URL: "postgresql://fabric:secret@localhost:5432/stub_db"
