envVarGroups:
  - name: fabric-flow-secrets
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        sync: false

services:
  - type: web
    name: textile-flow-svc
    runtime: node
    region: singapore
    plan: free
    rootDir: .
    buildCommand: npm install && npx turbo run build --filter=textile-flow-svc
    startCommand: node apps/textile-flow-svc/dist/main.js
    healthCheckPath: /health
    envVarGroups:
      - fabric-flow-secrets
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://fabric-flow-frontend.onrender.com

  - type: static
    name: fabric-flow-frontend
    region: singapore
    rootDir: .
    buildCommand: npm install && npx turbo run build --filter=@textile-flow/frontend
    staticPublishPath: apps/frontend/out
    envVarGroups:
      - fabric-flow-secrets
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
